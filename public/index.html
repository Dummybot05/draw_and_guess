<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Draw & Guess Pro</title>
    <style>
        :root {
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --canvas-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        html, body { 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; 
            background-color: var(--bg); 
            overscroll-behavior: none; 
            color: var(--text-main);
        }
        
        /* LOGIN SCREEN */
        #login-screen { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .login-card { background: var(--surface); padding: 40px 30px; border-radius: 24px; box-shadow: var(--canvas-shadow); width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--border); }
        .login-card h1 { margin-bottom: 24px; font-weight: 800; font-size: 28px; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .login-card input { width: 100%; padding: 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; margin-bottom: 20px; outline: none; transition: border 0.2s; background: var(--bg); }
        .login-card input:focus { border-color: var(--primary); background: var(--surface); }
        .login-card button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .login-card button:hover { background: var(--primary-hover); }

        /* MAIN APP CONTAINER */
        #app-container { display: none; flex-direction: column; height: 100dvh; max-width: 800px; margin: 0 auto; background: var(--bg); }

        /* Header */
        #header { padding: 12px 16px; background: var(--surface); flex-shrink: 0; border-bottom: 1px solid var(--border); z-index: 10; }
        #header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #status { font-weight: 600; font-size: 15px; flex: 1; display: flex; align-items: center; gap: 8px; }
        #timer { font-size: 15px; font-weight: 700; background: var(--bg); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); }
        
        #leaderboard { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .player-score { background: var(--bg); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
        .player-score.first-place { background: #FEF3C7; border-color: #FDE68A; color: #92400E; }

        /* Toolbar with Professional Icons */
        #toolbar { display: none; gap: 8px; justify-content: center; }
        .tool-btn { background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: var(--text-muted); }
        .tool-btn svg { width: 20px; height: 20px; stroke-width: 2.5; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .tool-btn.active { background: #EEF2FF; border-color: var(--primary); color: var(--primary); }

        /* Canvas Layout optimized for screen size */
        #canvas-wrapper { flex: 1 1 auto; min-height: 0; display: flex; justify-content: center; align-items: center; padding: 12px; position: relative; }
        canvas { background: var(--surface); width: 100%; height: 100%; object-fit: contain; border-radius: 16px; box-shadow: var(--canvas-shadow); touch-action: none; border: 1px solid var(--border); }

        /* Chat Area */
        #chat-section { height: 35vh; min-height: 200px; display: flex; flex-direction: column; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        #chat-history { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        #input-area { display: flex; padding: 12px 16px; gap: 10px; background: var(--bg); border-top: 1px solid var(--border); }
        
        /* Fixed Input Fields for Mobile */
        #input-area input { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; outline: none; background: var(--surface); box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        #input-area input:focus { border-color: var(--primary); }
        #input-area button { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 0 20px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Chat Bubbles */
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; width: fit-content; max-width: 90%; word-wrap: break-word; line-height: 1.5; }
        .msg-system { background: var(--bg); color: var(--text-muted); font-weight: 600; align-self: center; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; margin: 4px 0; }
        .msg-user { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-success { background: #ECFDF5; color: #065F46; font-weight: 700; align-self: center; border: 1px solid #A7F3D0; font-size: 14px; text-align: center; width: 100%; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.1); }
        .sender-name { font-size: 12px; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
                Draw & Guess
            </h1>
            <input type="text" id="usernameInput" placeholder="Enter your name" maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false" data-lpignore="true" />
            <button id="joinBtn">Play Now</button>
        </div>
    </div>

    <div id="app-container">
        <header id="header">
            <div id="header-top">
                <div id="status">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Waiting for server...
                </div>
                <div id="timer">180s</div>
            </div>
            <div id="leaderboard"></div>
            <div id="toolbar">
                <button id="penBtn" class="tool-btn active" title="Pen">
                    <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path></svg>
                </button>
                <button id="eraserBtn" class="tool-btn" title="Eraser">
                    <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20H20V20Z"></path></svg>
                </button>
                <button id="undoBtn" class="tool-btn" title="Undo">
                    <svg viewBox="0 0 24 24"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"></path></svg>
                </button>
                <button id="redoBtn" class="tool-btn" title="Redo">
                    <svg viewBox="0 0 24 24"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"></path></svg>
                </button>
                <button id="clearBtn" class="tool-btn" title="Clear Screen">
                    <svg viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
                </button>
            </div>
        </header>

        <div id="canvas-wrapper">
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>

        <section id="chat-section">
            <div id="chat-history"></div>
            <div id="input-area">
                <input type="text" id="guessInput" placeholder="Type a guess..." autocomplete="off" autocorrect="off" spellcheck="false" data-lpignore="true" />
                <button id="sendBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
